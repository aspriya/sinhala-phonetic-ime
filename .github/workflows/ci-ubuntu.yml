name: CI — Ubuntu
 
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
 
jobs:
  python-prototype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r prototype/requirements.txt
      - name: Run pytest
        run: python -m pytest prototype/tests -v
 
  cpp-engine:
    # Pinned to 22.04 because:
    #  - clang-15 + libstdc++-14 on 24.04 has <ranges> incompatibilities
    #  - lcov 2.0 on 24.04 rejects the gcov version emitted by gcc-12
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc-12,   cxx: g++-12 }
          - { cc: clang-15, cxx: clang++-15 }
    env:
      CC:  ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.compiler.cc }} ${{ matrix.compiler.cxx }} lcov
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ matrix.compiler.cxx }}-${{ hashFiles('CMakeLists.txt') }}
      - name: Configure
        run: cmake -B build -S . -DSINHALA_IME_BUILD_TESTS=ON -DSINHALA_IME_ENABLE_COVERAGE=${{ matrix.compiler.cc == 'gcc-12' && 'ON' || 'OFF' }}
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Coverage (GCC only)
        if: matrix.compiler.cc == 'gcc-12'
        run: |
          lcov --gcov-tool gcov-12 --directory build --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info
      - name: Upload coverage
        if: matrix.compiler.cc == 'gcc-12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info
 
  cross-validation:
    runs-on: ubuntu-22.04
    needs: [python-prototype, cpp-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++
          python -m pip install -r prototype/requirements.txt
      - name: Regenerate golden file from Python prototype
        run: python tools/generate_golden.py
      - name: Diff against committed golden
        run: git diff --exit-code engine/tests/golden.txt
      - name: Build C++ engine
        run: |
          cmake -B build -S . -DSINHALA_IME_BUILD_TESTS=ON
          cmake --build build -j
      - name: Run cross-validation test only
        run: ctest --test-dir build --output-on-failure -R GoldenFileCrossValidation
