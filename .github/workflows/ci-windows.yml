name: CI — Windows
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  msvc-engine:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (MSVC)
        run: cmake -B build -S . -DSINHALA_IME_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release -j
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
